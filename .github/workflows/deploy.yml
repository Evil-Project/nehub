name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Cloudflare
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
      D1_DATABASE_NAME: ${{ vars.D1_DATABASE_NAME }}
      D1_LOCATION: ${{ vars.D1_LOCATION }}
      R2_BUCKET_NAME: ${{ vars.R2_BUCKET_NAME }}
      R2_LOCATION: ${{ vars.R2_LOCATION }}
      PUBLIC_APP_NAME: ${{ vars.PUBLIC_APP_NAME }}
      PUBLIC_APP_URL: ${{ vars.PUBLIC_APP_URL }}
      PUBLIC_TURNSTILE_SITE_KEY: ${{ vars.PUBLIC_TURNSTILE_SITE_KEY }}
      AUTH_EMAIL_FROM: ${{ vars.AUTH_EMAIL_FROM }}
      DISCORD_CLIENT_ID: ${{ vars.DISCORD_CLIENT_ID }}
      DISCORD_REDIRECT_URI: ${{ vars.DISCORD_REDIRECT_URI }}
      MATURE_RESTRICTED_REGIONS: ${{ vars.MATURE_RESTRICTED_REGIONS }}
      TURNSTILE_SECRET_KEY: ${{ secrets.TURNSTILE_SECRET_KEY }}
      ADMIN_BOOTSTRAP_PASSWORD: ${{ secrets.ADMIN_BOOTSTRAP_PASSWORD }}
      DISCORD_CLIENT_SECRET: ${{ secrets.DISCORD_CLIENT_SECRET }}
      CI_PRODUCTION_DEPLOY: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run check

      - name: Build
        run: npm run build

      - name: Verify Cloudflare token
        run: npx wrangler whoami

      - name: Provision Cloudflare resources
        id: provision
        run: node scripts/provision-cloudflare.mjs

      - name: Apply D1 migrations
        run: npx wrangler d1 migrations apply "${{ steps.provision.outputs.d1_database_name }}" --remote --config "${{ steps.provision.outputs.wrangler_config }}"

      - name: Deploy Worker
        run: |
          set -o pipefail

          deploy_args=(--config "${{ steps.provision.outputs.wrangler_config }}")
          if [ "${{ steps.provision.outputs.has_secrets }}" = "true" ]; then
            deploy_args+=(--secrets-file "${{ steps.provision.outputs.secrets_file }}")
          fi

          mkdir -p .wrangler

          for attempt in 1 2 3; do
            log_file=".wrangler/deploy-attempt-${attempt}.log"
            echo "Deploy attempt ${attempt} of 3"

            if npx wrangler deploy "${deploy_args[@]}" 2>&1 | tee "${log_file}"; then
              exit 0
            else
              status=$?
            fi

            if grep -Eiq "workers/assets/upload|Asset upload failed|Received a malformed response from the API|429|5[0-9][0-9]|ECONNRESET|ETIMEDOUT" "${log_file}" && [ "${attempt}" -lt 3 ]; then
              sleep_seconds=$((attempt * 20))
              echo "Cloudflare deploy upload failed with a retryable error. Retrying in ${sleep_seconds}s."
              sleep "${sleep_seconds}"
              continue
            fi

            if grep -Eiq "401 Unauthorized|403 Forbidden" "${log_file}"; then
              echo "::error::Cloudflare denied the Worker static asset upload. Update CLOUDFLARE_API_TOKEN so it can deploy Workers and upload Workers static assets for the target account."
            fi

            exit "${status}"
          done

          exit 1
